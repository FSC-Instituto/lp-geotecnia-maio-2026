    <text x="840" y="270">Portaria do Credenciamento EaD nº 314, de 02/03/2020 - Publicação no D.O.U. de 04/03/2020.</text>
    <text x="840" y="294">GRUPO FOCUS DE EDUCAÇÃO LTDA - CNPJ: 14.334.814/0001-77</text>
  </g>
  <rect x="710" y="312" width="260" height="5" fill="#d4d4d4"/>

