      <rect x="12" y="0" width="4" height="34" fill="#b8bec8"/>
    </pattern>
    <linearGradient id="focusBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#204a91"/>
      <stop offset="1" stop-color="#3d2b86"/>
    </linearGradient>
