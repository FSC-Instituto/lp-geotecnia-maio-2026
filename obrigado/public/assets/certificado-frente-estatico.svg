<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 850" role="img" aria-labelledby="title desc">
  <title id="title">Certificado reconhecido pelo MEC</title>
  <desc id="desc">Frente de certificado da Faculdade Focus, sem nome de aluno.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f7ff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f4fc4"/>
      <stop offset="1" stop-color="#2521c9"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#11183f" flood-opacity=".16"/>
    </filter>
  </defs>

  <rect width="1200" height="850" fill="#eef2ff"/>
  <rect x="54" y="54" width="1092" height="742" rx="14" fill="url(#paper)" filter="url(#softShadow)"/>
  <rect x="78" y="78" width="1044" height="694" rx="8" fill="none" stroke="#d6dff8" stroke-width="4"/>

  <g fill="none" stroke-width="5" opacity=".95">
    <path d="M95 102h260" stroke="#0f4fc4" stroke-dasharray="10 8"/>
    <path d="M845 102h260" stroke="#0f4fc4" stroke-dasharray="10 8"/>
  </g>

  <g transform="translate(555 70)">
    <circle cx="0" cy="22" r="22" fill="#0f4fc4"/>
    <path d="M-7 28c11-24 30-24 46-16-17 1-28 10-33 27z" fill="#2521c9"/>
    <text x="40" y="20" font-family="Montserrat, Arial, sans-serif" font-size="24" font-weight="800" fill="#2521c9">FACULDADE</text>
    <text x="40" y="48" font-family="Montserrat, Arial, sans-serif" font-size="42" font-weight="900" fill="#2521c9">FOCUS</text>
  </g>

  <text x="600" y="190" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="32" font-weight="800" fill="#10152f">Faculdade Focus</text>
  <text x="600" y="238" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="16" font-weight="500" fill="#626a86">Credenciada pela Portaria MEC nº 1.004, de 17 de agosto de 2017</text>

  <g transform="translate(928 145)">
    <circle cx="78" cy="78" r="62" fill="none" stroke="#1d2446" stroke-width="3"/>
    <circle cx="78" cy="78" r="46" fill="none" stroke="#1d2446" stroke-width="2"/>
    <text x="78" y="74" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="16" font-weight="900" fill="#1d2446">RECONHECIDO</text>
    <text x="78" y="96" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="18" font-weight="900" fill="#2521c9">MEC</text>
  </g>

  <text x="600" y="340" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="54" font-weight="900" fill="url(#blue)">CERTIFICADO</text>
  <rect x="322" y="382" width="556" height="4" rx="2" fill="#2521c9" opacity=".22"/>

  <text x="600" y="450" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="19" font-weight="500" fill="#323a55">
    Certificamos que concluiu o curso de Pós-Graduação Lato Sensu em
  </text>
  <text x="600" y="490" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="27" font-weight="800" fill="#10152f">
    Engenharia de Fundações e Contenções
  </text>
  <text x="600" y="532" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="17" font-weight="500" fill="#626a86">
    com carga horária e critérios acadêmicos reconhecidos pela instituição.
  </text>

  <rect x="356" y="575" width="488" height="54" rx="27" fill="#fff" stroke="#d9e0f7"/>
  <text x="600" y="610" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="16" font-weight="700" fill="#8c94ad">
    Nome do aluno removido
  </text>

  <text x="600" y="682" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="17" font-weight="500" fill="#323a55">Cascavel, Paraná</text>

  <g stroke="#10152f" stroke-width="2" opacity=".7">
    <path d="M210 704h210"/>
    <path d="M790 704h210"/>
  </g>
  <text x="315" y="736" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="14" font-weight="700" fill="#323a55">Direção Acadêmica</text>
  <text x="895" y="736" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="14" font-weight="700" fill="#323a55">Coordenação</text>

  <rect x="78" y="756" width="1044" height="16" rx="8" fill="url(#blue)" opacity=".12"/>
</svg>
