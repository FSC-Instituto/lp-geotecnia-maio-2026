<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 1190" role="img" aria-labelledby="title desc">
  <title id="title">Certificado Faculdade Focus</title>
  <desc id="desc">Frente do certificado da Faculdade Focus, com dados do aluno em branco.</desc>
  <defs>
