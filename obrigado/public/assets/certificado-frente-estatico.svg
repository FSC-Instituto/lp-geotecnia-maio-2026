    <text x="1022" y="686">e do RG: n.º</text>
    <line x1="1164" y1="688" x2="1395" y2="688" stroke="#202020" stroke-width="1.5"/>
    <text x="1408" y="686">, que concluiu</text>

    <text x="118" y="727">nesta instituição a especialização Pós-Graduação Lato Sensu em Engenharia de Fundações e Contenções, realizado no</text>
    <text x="420" y="768">período de 21/06/2023 a 31/12/2024, com carga horária de 360 horas.</text>
  </g>

  <text x="840" y="838" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#202020">Cascavel, 01 de maio de 2025.</text>

