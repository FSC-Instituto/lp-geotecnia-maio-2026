  <rect width="1680" height="1190" fill="#fff"/>
  <rect x="36" y="16" width="610" height="28" fill="url(#slashes)"/>
  <rect x="1042" y="16" width="604" height="28" fill="url(#slashes)"/>
  <rect x="36" y="1144" width="610" height="30" fill="url(#slashes)"/>
  <rect x="1036" y="1144" width="610" height="30" fill="url(#slashes)"/>

